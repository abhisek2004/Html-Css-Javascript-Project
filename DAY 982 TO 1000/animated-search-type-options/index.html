<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>Animated Search Type Options</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"><link rel='stylesheet' href='https://fonts.googleapis.com/css2?family=DM+Sans&amp;display=swap'><link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<form class="search">
	<div class="search__wrapper">
		<label class="search__label" for="search">Search</label>
		<button class="search__button" type="button" title="Change type" data-type="0">
			<svg class="search__button-icon" viewBox="0 0 24 24" width="24px" height="24px" aria-hidden="true" data-icon>
				<g fill="none" stroke="currentcolor" stroke-linecap="round" stroke-width="2" transform="rotate(-45,12,12)">
					<circle r="6" cx="12" cy="12" />
					<line x1="12" y1="18" x2="12" y2="23" />
				</g>
			</svg>
			<span class="search__label">All</span>
			<span class="search__label" hidden>Images</span>
			<span class="search__label" hidden>Videos</span>
			<span class="search__label" hidden>News</span>
			<span class="search__label" hidden>Maps</span>
			<span class="search__label" hidden>Shopping</span>
		</button>
		<input class="search__input" id="search" type="search" name="search" required>
		<div class="search__placeholders" aria-hidden="true" data-placeholders>
			<span class="search__placeholder">All</span>
			<span class="search__placeholder">Images</span>
			<span class="search__placeholder">Videos</span>
			<span class="search__placeholder">News</span>
			<span class="search__placeholder">Maps</span>
			<span class="search__placeholder">Shopping</span>
		</div>
	</div>
</form>
<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
