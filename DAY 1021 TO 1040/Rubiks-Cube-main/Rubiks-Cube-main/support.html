<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="favicon.png">
  <title>Support</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #FF5800;
      --blue: #0051A2;
      --yellow: #FFD500;
      --green: #009B48;
      --orange: #C41E3A;
      --bg: #08080f;
      --bg2: #0e0e18;
      --text: #e8e8f2;
      --dim: #7a7a99;
    }

    .logo,
    .logo:visited,
    .logo:hover,
    .logo:active {
      text-decoration: none;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }
    .logo {
      color: var(--text);
    }

    .logo:visited {
      color: var(--text);
    }

    .logo:hover {
      color: var(--text);
    }
    
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
  }

  .support {
    text-align: center;
    padding: 20px 20px 60px;
  }

  .support h1 {
    font-size: 2.5rem;
    margin-bottom:10px;
  }

  .support p {
    color: var(--dim);
    margin-bottom: 30px;
  }

  .card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  }

  .amounts button {
    margin: 10px;
    padding: 14px 22px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .amounts button:hover {
    transform: translateY(-3px);
    border-color: var(--yellow);
    color: var(--yellow);
    box-shadow: 0 0 20px rgba(255,213,0,0.3);
  }

  input {
    margin-top: 15px;
    padding: 12px;
    width: 220px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--text);
    text-align: center;
    outline: none;
  }

  input:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 10px rgba(255,213,0,0.2);
  }

  button {
    margin-top: 20px;
  }

  .card > button {
    padding: 14px 28px;
    background: linear-gradient(135deg, var(--red), var(--orange));
    color: #fff;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.25s ease;
    box-shadow: 0 0 30px rgba(255,88,0,0.3);
  }

  .card > button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(255,88,0,0.5);
  }
  #cur {
    width: 36px;
    height: 36px;
    border: 2px solid var(--yellow);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width .2s, height .2s, border-color .2s;
    mix-blend-mode: difference;
  }

  #cur-dot {
    width: 5px;
    height: 5px;
    background: var(--yellow);
    border-radius: 50%;
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
  }

  body {
    cursor: none;
  }

  a, button {
    cursor: none;
  }

  body:has(a:hover) #cur,
  body:has(button:hover) #cur {
    width: 52px;
    height: 52px;
    border-color: var(--orange);
  }
  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  #progress {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    z-index: 9998;
    background: linear-gradient(90deg, var(--red), var(--orange), var(--yellow));
    width: 0;
  }
  body {
    padding-top: 80px;
  }
  nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 9999;
  padding: 18px 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(8, 8, 15, .95);
  backdrop-filter: blur(24px);
  border-bottom: 1px solid rgba(255, 255, 255, .05);
}

</style>
</head>
<body>
  <nav>
    <a href="index.html#hero" class="logo">
      <div class="logo-cube"></div>
      Portfolio
    </a>
  </nav>
  <div id="cur"></div>
  <div id="cur-dot"></div>
  <canvas id="bg-canvas"></canvas>
  <div id="progress"></div>

  <section class="support">
    <h1>Support the Developer ❤️</h1>
    <p>
      If my work helped you even a little, you can support me here.
      Every contribution helps me build bigger things!
    </p>

    <div class="card">
      <h2>Select Amount</h2>

      <div class="amounts">
        <button onclick="pay(10)">₹10 • Coffee</button>
        <button onclick="pay(100)">₹100 • Appreciate</button>
        <button onclick="pay(1000)">₹1000 • Backer</button>
      </div>

      <input type="number" id="customAmount" placeholder="Enter custom amount" />

      <button onclick="customPay()">Proceed</button>
    </div>

    <div id="qrContainer"></div>
    <p style="color:var(--dim);font-size:.8rem">
      Secure UPI payment • No data stored
    </p>

  </section>

  <script>
  function generateUPI(amount) {
    return `upi://pay?pa=7837736168@pz&pn=Support%20Developer&cu=INR&am=${amount}`;
  }

  function pay(amount) {
    const upi = generateUPI(amount);

    // Try opening UPI app
    window.location.href = upi;

    // Show fallback UI
    showQR(amount, upi);
  }

  function customPay() {
    const amount = document.getElementById("customAmount").value;

    if (!amount || amount < 1) {
      alert("Enter valid amount (min ₹1)");
      return;
    }

    pay(amount);
  }

  function showQR(amount, upiLink) {
    const container = document.getElementById("qrContainer");

    container.innerHTML = `
      <div style="margin-top:40px">
        <h3 style="color:var(--yellow)">Complete Payment</h3>
        <p style="color:var(--dim)">If UPI app didn't open, scan QR</p>

        <img 
          src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(upiLink)}"
          style="margin-top:20px;border-radius:12px;background:white;padding:10px"
        />

        <p style="margin-top:15px;color:var(--dim)">Amount: ₹${amount}</p>
        <p style="font-size:.8rem;color:var(--dim)">UPI ID: 7837736168@pz</p>
      </div>
    `;
  }
  

  const cur = document.getElementById('cur');
  const curDot = document.getElementById('cur-dot');
  let mx = 0, my = 0, cx = 0, cy = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX;
    my = e.clientY;
  });

  (function moveCursor() {
    cx += (mx - cx) * .14;
    cy += (my - cy) * .14;

    cur.style.left = cx + 'px';
    cur.style.top = cy + 'px';

    curDot.style.left = mx + 'px';
    curDot.style.top = my + 'px';

    requestAnimationFrame(moveCursor);
  })();

  // SCROLL PROGRESS
  const prog = document.getElementById('progress');
  window.addEventListener('scroll', () => {
    prog.style.width =
      (window.scrollY /
        (document.documentElement.scrollHeight - innerHeight)) * 100 + '%';
  }, { passive: true });

  // PARTICLES
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const PCOLS = ['#FF5800', '#0051A2', '#FFD500', '#009B48', '#C41E3A'];

  function resizeCanvas() {
    canvas.width = innerWidth;
    canvas.height = innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  class Particle {
    constructor() { this.init(true); }
    init(rand) {
      this.x = Math.random() * canvas.width;
      this.y = rand ? Math.random() * canvas.height : canvas.height + 10;
      this.sz = Math.random() * 7 + 2;
      this.col = PCOLS[Math.floor(Math.random() * PCOLS.length)];
      this.vx = (Math.random() - .5) * .5;
      this.vy = -(Math.random() * .45 + .1);
      this.rot = Math.random() * Math.PI * 2;
      this.spin = (Math.random() - .5) * .045;
      this.a = Math.random() * .12 + .02;
    }
    tick() {
      this.x += this.vx;
      this.y += this.vy;
      this.rot += this.spin;

      if (this.y < -12 || this.x < -12 || this.x > canvas.width + 12)
        this.init(false);
    }
    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.rot);
      ctx.globalAlpha = this.a;
      ctx.fillStyle = this.col;
      ctx.fillRect(-this.sz / 2, -this.sz / 2, this.sz, this.sz);
      ctx.restore();
    }
  }

  const parts = Array.from({ length: 72 }, () => new Particle());

  (function tickP() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    parts.forEach(p => { p.tick(); p.draw(); });
    requestAnimationFrame(tickP);
  })();

</script>

</body>
</html>
